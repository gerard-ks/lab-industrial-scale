input:
  generate:
    interval: 2s
    mapping: 'root = "Hello depuis Redpanda Connect!"'

output:
  broker:
    pattern: fan_out
    outputs:
      # Envoi réel dans votre conteneur NATS
      - nats:
          urls: [ "nats://nats:4222" ]
          subject: "events.test.demo" # 'events.demo' matchera le stream EVENT_STORE (events.>)

      # Affichage direct dans les logs de votre conteneur Docker Redpanda
      - stdout: {}

spring:
  config:
    import:
      - classpath:/order-module.yml
      - classpath:/inventory-module.yml
      - classpath:/platform-module.yml
      - classpath:/notification-module.yml

  datasource:
    url: jdbc:postgresql://localhost:5432/lab_db
    username: lab_user
    password: lab_password
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    schemas: infra_schema, order_schema, inventory_schema, notification_schema
    locations: classpath:db/migration/order, classpath:db/migration/inventory, classpath:db/migration/platform, classpath:db/migration/notification

  temporal:
    connection:
      target: "127.0.0.1:7233" # Pointe vers le port gRPC du conteneur Docker Temporal

    workers-auto-discovery:
      workflow-packages:
        - com.poc.modules.order.internal.workflow
        - com.poc.modules.inventory.internal.workflow
        - com.poc.modules.notification.internal.workflow
      register-activity-beans: true


    # On définit les "Task Queues" (Files d'attente) que nos Workers Java vont écouter
    workers:
      - task-queue: "OrderTaskQueue"
      - task-queue: "InventoryTaskQueue"
      - task-queue: "NotificationTaskQueue"

chaos:
  monkey:
    force-stock-fail: false


logging:
  level:
    io.temporal: DEBUG
    io.temporal.spring.boot: DEBUG
